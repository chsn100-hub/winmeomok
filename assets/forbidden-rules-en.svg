<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Forbidden moves for Black</title>
  <desc id="desc">Visual examples of overline, double-three, and double-four forbidden moves.</desc>
  <rect width="900" height="420" rx="18" fill="#f8f3e8"/>
  <text x="48" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#211913">Forbidden moves for Black</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="17" fill="#655747">Black cannot play a move that creates one of these shapes.</text>
  <g transform="translate(44 126)"><rect width="250" height="238" rx="12" fill="#fffdf8" stroke="#d9c8ad"/><text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15120f">Overline</text><text x="24" y="70" font-family="Arial, sans-serif" font-size="15" fill="#6b5d4e">Six or more stones in a row</text><g transform="translate(26 104)" stroke="#8d6b42" stroke-width="2"><line x1="0" y1="36" x2="198" y2="36"/><line x1="0" y1="72" x2="198" y2="72"/><line x1="0" y1="108" x2="198" y2="108"/><line x1="22" y1="12" x2="22" y2="132"/><line x1="58" y1="12" x2="58" y2="132"/><line x1="94" y1="12" x2="94" y2="132"/><line x1="130" y1="12" x2="130" y2="132"/><line x1="166" y1="12" x2="166" y2="132"/></g><g fill="#111"><circle cx="48" cy="176" r="13"/><circle cx="84" cy="176" r="13"/><circle cx="120" cy="176" r="13"/><circle cx="156" cy="176" r="13"/><circle cx="192" cy="176" r="13"/><circle cx="228" cy="176" r="13"/></g><text x="180" y="178" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#c93b30">×</text></g>
  <g transform="translate(325 126)"><rect width="250" height="238" rx="12" fill="#fffdf8" stroke="#d9c8ad"/><text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15120f">Double-three</text><text x="24" y="70" font-family="Arial, sans-serif" font-size="15" fill="#6b5d4e">Two open threes at once</text><g transform="translate(36 100)" stroke="#8d6b42" stroke-width="2"><line x1="0" y1="36" x2="176" y2="36"/><line x1="0" y1="72" x2="176" y2="72"/><line x1="0" y1="108" x2="176" y2="108"/><line x1="34" y1="2" x2="34" y2="142"/><line x1="70" y1="2" x2="70" y2="142"/><line x1="106" y1="2" x2="106" y2="142"/><line x1="142" y1="2" x2="142" y2="142"/></g><g fill="#111"><circle cx="70" cy="172" r="13"/><circle cx="106" cy="172" r="13"/><circle cx="142" cy="172" r="13"/><circle cx="142" cy="136" r="13"/><circle cx="142" cy="208" r="13"/></g><circle cx="142" cy="172" r="17" fill="none" stroke="#c93b30" stroke-width="4"/><text x="164" y="178" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#c93b30">×</text></g>
  <g transform="translate(606 126)"><rect width="250" height="238" rx="12" fill="#fffdf8" stroke="#d9c8ad"/><text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15120f">Double-four</text><text x="24" y="70" font-family="Arial, sans-serif" font-size="15" fill="#6b5d4e">Two four-stone threats</text><g transform="translate(34 96)" stroke="#8d6b42" stroke-width="2"><line x1="0" y1="32" x2="180" y2="32"/><line x1="0" y1="68" x2="180" y2="68"/><line x1="0" y1="104" x2="180" y2="104"/><line x1="18" y1="0" x2="18" y2="132"/><line x1="54" y1="0" x2="54" y2="132"/><line x1="90" y1="0" x2="90" y2="132"/><line x1="126" y1="0" x2="126" y2="132"/><line x1="162" y1="0" x2="162" y2="132"/></g><g fill="#111"><circle cx="52" cy="164" r="13"/><circle cx="88" cy="164" r="13"/><circle cx="124" cy="164" r="13"/><circle cx="160" cy="164" r="13"/><circle cx="124" cy="128" r="13"/><circle cx="124" cy="200" r="13"/></g><circle cx="124" cy="164" r="17" fill="none" stroke="#c93b30" stroke-width="4"/><text x="176" y="170" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#c93b30">×</text></g>
</svg>
