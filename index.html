<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경기용 오목게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="game-header">
      <div>
        <h1 id="titleText">경기용 오목</h1>
        <p id="subtitleText" class="subtitle">흑 금수 규칙이 적용된 15줄 오목</p>
      </div>
      <div class="score-card" aria-live="polite">
        <span id="turnBadge" class="turn-badge black-turn">흑 차례</span>
        <span id="moveCount">0수</span>
        <span id="timerBadge" class="timer-badge">20초</span>
      </div>
    </header>

    <p id="status">현재 차례: 흑돌 ●</p>

    <section class="game-options" aria-label="대전 설정">
      <label>
        <span id="languageLabel">언어</span>
        <select id="languageSelect">
          <option value="ko" selected>한국어</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </label>
      <label>
        <span id="opponentLabel">대전</span>
        <select id="opponentSelect">
          <option id="opponentComputerOption" value="computer" selected>컴퓨터와 대전</option>
          <option id="opponentHumanOption" value="human">2인 대전</option>
        </select>
      </label>
      <label>
        <span id="humanColorLabel">내 돌</span>
        <select id="humanColorSelect">
          <option id="humanBlackOption" value="1" selected>흑돌</option>
          <option id="humanWhiteOption" value="2">백돌</option>
        </select>
      </label>
      <label id="difficultyField">
        <span id="difficultyLabel">난이도</span>
        <select id="difficultySelect">
          <option id="difficultyEasyOption" value="easy">쉬움</option>
          <option id="difficultyNormalOption" value="normal" selected>보통</option>
          <option id="difficultyHardOption" value="hard">어려움</option>
          <option id="difficultyHellOption" value="hell">헬어려움</option>
        </select>
      </label>
    </section>

    <section id="startPanel" class="start-panel">
      <p id="startHint">대전 방식과 난이도를 고른 뒤 시작하세요.</p>
      <button id="startBtn" type="button">게임 시작</button>
    </section>

    <div class="board-wrap">
      <div id="board" class="board"></div>
      <div id="gameOverBanner" class="game-over-banner" hidden>
        <strong id="winnerText">흑돌 승리!</strong>
        <button id="playAgainBtn" type="button">다시하기</button>
      </div>
    </div>

    <div class="toolbar" aria-label="게임 도구">
      <button id="undoBtn" type="button">한 수 무르기</button>
    </div>

    <div class="buttons">
      <button id="resetBtn">다시 시작</button>
    </div>

    <section class="panel">
      <div class="panel-header">
        <h2 id="moveLogTitle">착수 기록</h2>
        <label class="toggle">
          <input id="forbiddenToggle" type="checkbox" checked />
          <span id="forbiddenToggleLabel">금수 표시</span>
        </label>
      </div>
      <ol id="moveLog" class="move-log"></ol>
    </section>

    <section class="rules">
      <h2 id="rulesTitle">적용 규칙</h2>
      <p id="rulesText">15x15 보드에서 흑은 정확히 5목을 만들면 승리합니다. 백은 5목 이상이면 승리합니다.</p>
      <figure class="forbidden-figure">
        <img id="forbiddenRulesImage" src="assets/forbidden-rules-ko.svg" alt="흑돌 금수 규칙: 장목, 쌍삼, 쌍사" />
        <figcaption id="forbiddenRulesCaption">흑돌 금수는 위 세 가지 모양을 만들 수 없습니다.</figcaption>
      </figure>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
